<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Octask — текстовый блокнот</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .note-card {
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <h1 class="mb-4">📘 Octask</h1>
        <p class="lead">Сохраняйте свои заметки</p>


        <div class="card mb-4">
            <div class="card-body">
                <form method="post" action="/add">
                    <div class="mb-3">
                        <label for="content" class="form-label">Текст заметки</label>
                        <textarea name="content" id="content" class="form-control" rows="3" required placeholder="Что нужно запомнить?..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">➕ Добавить заметку</button>
                </form>
            </div>
        </div>


        <h2>Ваши заметки</h2>
        {% if notes %}
            <div class="row">
                {% for note in notes %}
                    <div class="col-md-6 col-lg-4">
                        <div class="card note-card">
                            <div class="card-body">
                                <p class="card-text">{{ note.content }}</p>
                                <div class="mt-3">
                                    <a href="/delete/{{ note.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Удалить заметку?')">🗑️ Удалить</a>
                                </div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info">Пока нет заметок. Добавьте первую!</div>
        {% endif %}
    </div>
</body>
</html>
